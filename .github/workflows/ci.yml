name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep these in sync with the `tag` on the Verus git dependencies in Cargo.toml.
  VERUS_RELEASE: release/0.2026.05.13.fae8859
  VERUS_ARCHIVE: verus-0.2026.05.13.fae8859-x86-linux.zip
  # The exact Rust version this Verus release requires. If you bump VERUS_RELEASE,
  # Verus's error message states the version to put here.
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Install Verus
        run: |
          curl -sSL -o "$RUNNER_TEMP/verus.zip" \
            "https://github.com/verus-lang/verus/releases/download/$VERUS_RELEASE/$VERUS_ARCHIVE"
          unzip -q "$RUNNER_TEMP/verus.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/verus-x86-linux" >> "$GITHUB_PATH"

      - name: Verify library
        run: |
          cargo verus build 2>&1 | tee verus.log
          if grep -Eq 'error:|warning:' verus.log; then
            echo "::error::cargo verus build reported errors or warnings"
            exit 1
          fi

      - name: Verify examples
        run: |
          for dir in examples/*/; do
            example="$(basename "$dir")"
            echo "::group::cargo verus build --example $example"
            cargo verus build --example "$example" 2>&1 | tee "verus-$example.log"
            if grep -Eq 'error:|warning:' "verus-$example.log"; then
              echo "::error::example $example reported errors or warnings"
              exit 1
            fi
            echo "::endgroup::"
          done
